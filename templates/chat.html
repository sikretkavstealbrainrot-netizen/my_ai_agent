cat > templates/chat.html << 'EOF'
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>👼AngelAI👼 </title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: #ffffff;
            height: 100vh;
            display: flex;
        }
        .sidebar {
            width: 280px;
            background: #f9fafb;
            border-right: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header { padding: 20px; border-bottom: 1px solid #e5e7eb; }
        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background: #3b82f6;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .sessions-list { flex: 1; padding: 12px; }
        .session-item {
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 10px;
            cursor: pointer;
            color: #4b5563;
        }
        .session-item:hover { background: #f3f4f6; }
        .session-item.active { background: #eff6ff; color: #1f2937; font-weight: 500; }
        .delete-session { float: right; opacity: 0; cursor: pointer; color: #ef4444; }
        .session-item:hover .delete-session { opacity: 1; }
        .main-chat { flex: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 20px 30px; background: #ffffff; border-bottom: 1px solid #e5e7eb; }
        .chat-header h1 { color: #1f2937; font-size: 20px; }
        .chat-header p { color: #6b7280; font-size: 12px; }
        .messages-container { flex: 1; overflow-y: auto; padding: 20px 30px; }
        .message { display: flex; margin-bottom: 20px; }
        .message-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-right: 12px; font-size: 18px;
        }
        .message.user .message-avatar { background: #3b82f6; }
        .message.assistant .message-avatar { background: #10b981; }
        .message-content {
            padding: 12px 16px;
            border-radius: 16px;
            max-width: 80%;
            line-height: 1.6;
            font-size: 14px;
        }
        .message.user .message-content { background: #3b82f6; color: white; }
        .message.assistant .message-content { background: #f3f4f6; color: #1f2937; }
        .message-content pre { background: #1f2937; border-radius: 8px; padding: 12px; overflow-x: auto; color: #e5e7eb; }
        .input-area { padding: 20px 30px; background: #ffffff; border-top: 1px solid #e5e7eb; }
        .input-wrapper {
            display: flex; gap: 12px; background: #f9fafb;
            border-radius: 24px; padding: 8px 8px 8px 20px;
            border: 1px solid #e5e7eb;
        }
        .input-wrapper input { flex: 1; background: transparent; border: none; color: #1f2937; outline: none; }
        .send-btn { background: #3b82f6; border: none; border-radius: 20px; padding: 8px 20px; color: white; cursor: pointer; }
        .typing-indicator { display: flex; gap: 4px; padding: 12px 16px; }
        .typing-indicator span { width: 8px; height: 8px; background: #9ca3af; border-radius: 50%; animation: bounce 1.4s infinite; }
        @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-10px); } }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #10b981; color: white; padding: 12px 20px; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" onclick="newChat()">+ Новый чат</button>
        </div>
        <div class="sessions-list" id="sessionsList"></div>
    </div>
    <div class="main-chat">
        <div class="chat-header">
            <h1>🤖 My AI Agent</h1>
            <p>Локальный ИИ-ассистент | Полностью оффлайн</p>
        </div>
        <div class="messages-container" id="messagesContainer">
            <div style="text-align: center; color: #9ca3af; padding: 40px;">✨ Напиши что-нибудь</div>
        </div>
        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="Напиши сообщение..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">Отправить</button>
            </div>
        </div>
    </div>
    <script>
        let currentSessionId = null, messagesHistory = [], isLoading = false;
        async function loadSessions() {
            const r = await fetch('/api/sessions');
            const sessions = await r.json();
            const container = document.getElementById('sessionsList');
            if(!sessions.length){ container.innerHTML='<div style="padding:20px;color:#9ca3af;">Нет чатов</div>'; return; }
            container.innerHTML = sessions.map(s => `<div class="session-item ${currentSessionId===s.id?'active':''}" onclick="loadSession('${s.id}')"><span class="delete-session" onclick="event.stopPropagation(); deleteSession('${s.id}')">🗑️</span><div>${escapeHtml(s.preview)}</div><div style="font-size:10px;color:#9ca3af;">${new Date(s.updated_at).toLocaleString()}</div></div>`).join('');
        }
        async function loadSession(id) {
            currentSessionId = id;
            const r = await fetch(`/api/session/${id}`);
            const data = await r.json();
            messagesHistory = data.history || [];
            renderMessages();
            await loadSessions();
        }
        async function newChat() {
            const r = await fetch('/api/session/new', {method:'POST'});
            const data = await r.json();
            await loadSession(data.session_id);
        }
        async function deleteSession(id) {
            if(!confirm('Удалить чат?')) return;
            await fetch(`/api/session/delete/${id}`, {method:'DELETE'});
            if(currentSessionId === id) await newChat();
            else await loadSessions();
        }
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if(!message || isLoading) return;
            input.value = '';
            isLoading = true;
            document.getElementById('sendBtn').disabled = true;
            messagesHistory.push({role:'user', content:message});
            renderMessages();
            showTyping();
            try {
                const r = await fetch('/api/chat', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({message, session_id:currentSessionId, history:messagesHistory.slice(0,-1)})
                });
                const data = await r.json();
                hideTyping();
                messagesHistory = data.history;
                renderMessages();
                await loadSessions();
            } catch(e) {
                hideTyping();
                messagesHistory.pop();
                renderMessages();
            } finally {
                isLoading = false;
                document.getElementById('sendBtn').disabled = false;
                input.focus();
            }
        }
        function renderMessages() {
            const container = document.getElementById('messagesContainer');
            if(!messagesHistory.length){ container.innerHTML='<div style="text-align:center;color:#9ca3af;padding:40px;">✨ Напиши что-нибудь</div>'; return; }
            container.innerHTML = messagesHistory.map(msg => `<div class="message ${msg.role}"><div class="message-avatar">${msg.role==='user'?'👤':'🤖'}</div><div class="message-content">${escapeHtml(msg.content).replace(/\\n/g,'<br>')}</div></div>`).join('');
            container.scrollTop = container.scrollHeight;
        }
        function showTyping() {
            const c = document.getElementById('messagesContainer');
            const d = document.createElement('div');
            d.className = 'message assistant';
            d.id = 'typing';
            d.innerHTML = '<div class="message-avatar">🤖</div><div class="message-content"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
            c.appendChild(d);
            c.scrollTop = c.scrollHeight;
        }
        function hideTyping() { const t = document.getElementById('typing'); if(t) t.remove(); }
        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function handleKeyPress(e) { if(e.key === 'Enter') sendMessage(); }
        newChat();
    </script>
</body>
</html>
EOF
